<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D</title>

  <!-- Include model-viewer library -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    /* Reset default margin/padding */
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, verdana, sans-serif;
        background-color: #656161;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height:100vh;
        padding: 20px;
        padding-top: 0;

    }
    header {
        width: 100%;
        text-align: center;
        padding-bottom: 1px solid #ccc;
        margin-bottom: 40px;

    }

    header h1 {
        font-size: 2.2rem;
        color: #222;

    }

    main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;

    }

    model-viewer {
      width: 600px;
      height: 600px;
      background-color: #9d9c9c;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .description {
        max-width: 600px;
        text-align: center;
        font-size: 1rem;
        line-height: 1.6;
        color: #555;
    }

    @media (max-width: 700px) {
      model-viewer {
        width: 90%;
        height: 400px;
      }
    }
    .red-strip{
      position fixed;
      top: 0;
      left: 0;
      width: 75vw;
      height: 1px;
      background: rgb(189, 10, 10);
      z-index: 9999;
      margin: 0;

    }
  </style>
</head>
<body>
  <div class="red-strip"></div>
    

  <header>3D Wardrobe</header>
  <main>

  <!-- Interactive 3D Model -->
  <model-viewer src="wardrobe4.glb" 
                alt="Wardrobe4 Model" 
                auto-rotate 
                camera-controls 
                interaction-prompt="auto"
                shadow-intensity="1" 
                exposure="1"
                ar
                background-color="#ffffff">
  </model-viewer>

   <h2>Javis robot</h2>
   <model-viewer src="wardrobe3.glb" 
                alt="wardrobe3 Model" 
                auto-rotate 
                camera-controls 
                interaction-prompt="auto"
                shadow-intensity="1" 
                exposure="1"
                ar
                background-color="#ffffff">
  </model-viewer>
  <model-viewer src="wardrobe2.glb" 
                alt="wardrobe2 Model" 
                auto-rotate 
                camera-controls 
                interaction-prompt="auto"
                shadow-intensity="1" 
                exposure="1"
                ar
                background-color="#ffffff">
  </model-viewer>
  </main>

</body>
</html>
